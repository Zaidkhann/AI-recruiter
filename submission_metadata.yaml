# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  '''We abandoned the traditional boolean keyword search in favor of a Multi-Stage Semantic Retrieval & 18-Factor Scoring Pipeline.  
 
1. Retrieval (Semantic + Graph-Assisted)
 
Retrieval Engine: We use Qdrant (with a NumPy fallback for resilience) to perform a K-Nearest Neighbors (KNN) semantic search across candidate embeddings.
 
2. Scoring & Models Used (The 18-Factor Engine)

Once the candidate pool is retrieved, we evaluate them across 18 independent signals using specialized engines:

Skill Adjacency (NetworkX Graph): We don't use binary matching. We built a directed weighted graph in NetworkX where nodes are skills and edges are relationships (e.g., React → Vue = 0.80). We run Shortest Path Graph Traversal to calculate an adjacency score. Candidates get credit for knowing equivalent technologies.

Behavioral Intelligence (Heuristics & Threshold Mapping): We fetch live GitHub data and run it through a custom Threshold Normalization Heuristic. We map raw data (commits, PRs, repo sizes) across 4 sigmoid-like thresholds (low/med/high/max) to generate 7 signals, including Engineering Maturity (measuring language sophistication tiers) and Startup Readiness (measuring rapid iteration speed).

Career Trajectory & Success Potential (Time-Series Heuristics): We calculate the derivative of their career — Promotion Velocity (levels climbed per year) and Job Stability (average tenure).

Market Intelligence: We use a static heuristic map of trending technologies (e.g., PyTorch=0.95, Rust=0.90) to calculate market alignment and Learning Velocity (skills acquired per year of experience).
 
3. Combining Signals into a Final Ranking
 Base Raw Score: The 18 factors (semantic fit, adjacency, behavioral score, trajectory, etc.) are combined using a weighted sum.
Disqualification Gates: Before ranking, candidates must pass threshold gates (e.g., core semantic threshold, absolute lack of adjacent skills).

The Result: A final score clamped between 0 and 100. We don't just output the number — the entire calculation, including factor contribution percentages and modifier impacts, is output as a Ranking Audit Trail JSON, ensuring the AI's decision is 100% transparent, auditable, and free of black-box bias.  

'''

